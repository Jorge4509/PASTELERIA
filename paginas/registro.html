<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sweet Pig Bakery | Registro</title>
    <link rel="stylesheet" href="../estilos/login-registro.css">
</head>
<body>
    <div class="auth-card">
        <h2>Crear Cuenta Gourmet</h2>
        <p>Completa tus datos para realizar pedidos artesanales</p>
        <form id="form-registro">
            <div class="input-box"><input type="text" placeholder="Nombre Completo" required></div>
            <div class="input-box"><input type="email" placeholder="Correo Electrónico" required></div>
            <div class="input-box"><input type="password" placeholder="Establecer Contraseña" required></div>
            <button type="submit" class="btn-auth">Registrar e Iniciar</button>
        </form>
        <div class="auth-footer"><a href="login.html">¿Ya tienes cuenta? Inicia sesión aquí</a></div>
    </div>
</body>
</html>

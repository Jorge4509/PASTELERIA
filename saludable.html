<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Boar Hat - Pastelería Saludable</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/saludable.css">
</head>
<body>

    <!-- Navegación simple -->
    <header>
        <nav class="navbar">
            <div class="logo">The Boar Hat 🍰</div>
            <ul class="nav-links">
                <li><a href="index.html">Catálogo</a></li>
                <li><a href="saludable.html" class="active">Pastelería Saludable</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <header class="section-header">
            <h1>Sección de Pastelería Saludable</h1>
            <p>Análisis nutricional automático en tiempo real impulsado por la API de Edamam.</p>
        </header>

        <!-- Buscador / Filtro rápido -->
        <section class="search-section">
            <input type="text" id="search-cake" placeholder="Buscar pastel (ej. Pastel de Zanahoria)...">
        </section>

        <!-- Contenedor de Tarjetas de Pasteles -->
        <section class="grid-pasteles" id="grid-pasteles">
            <!-- JavaScript inyectará las tarjetas aquí -->
        </section>
    </main>

    <!-- Modal para Detalle Nutricional Ampliado -->
    <div id="modal-nutricional" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modal-titulo">Detalle del Pastel</h2>
            <div class="modal-body">
                <div class="macro-stats">
                    <p><strong>Calorías:</strong> <span id="modal-calorias">0</span> kcal</p>
                    <p><strong>Carbohidratos:</strong> <span id="modal-carbos">0</span>g</p>
                    <p><strong>Azúcares:</strong> <span id="modal-azucar">0</span>g</p>
                </div>
                <h3>Alérgenos Detectados</h3>
                <ul id="modal-alergenos"></ul>
            </div>
        </div>
    </div>

    <!-- Scripts Modulares -->
    <script src="js/api-edamam.js"></script>
    <script src="js/modulo-saludable.js"></script>
</body>
</html>

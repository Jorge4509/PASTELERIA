<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - The Boar Hat</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .metric-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-left: 5px solid #8B5E3C;
            text-align: center;
        }
        .metric-card h3 { margin: 0; color: #7f8c8d; }
        .metric-card p { font-size: 32px; font-weight: bold; margin: 10px 0 0 0; color: #2C3E50; }
        .btn-admin {
            display: block;
            background: #2C3E50;
            color: white;
            text-align: center;
            padding: 12px;
            margin-top: 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn-admin:hover { background: #34495E; }
    </style>
</head>
<body style="background-color: #FDFBF7; margin:0; font-family: sans-serif;">

    <header class="navbar" style="background-color: #2C3E50;">
        <div class="logo">👑 Admin - The Boar Hat</div>
        <ul class="nav-links">
            <li><a href="dashboard.html" class="active">Inicio</a></li>
            <li><a href="inventario.html">Inventario</a></li>
            <li><a href="pedidos.html">Pedidos</a></li>
            <li><a href="../index.html" style="background:#c0392b;">Salir Vista Cliente</a></li>
        </ul>
    </header>

    <main class="container" style="max-width: 1000px; margin: 40px auto; padding: 0 20px;">
        <h2>Panel de Control General</h2>
        <p>Bienvenido al sistema de gestión interna de la pastelería.</p>

        <div class="admin-grid">
            <div class="metric-card">
                <h3>Pedidos Hoy</h3>
                <p>12</p>
                <a href="pedidos.html" class="btn-admin">Gestionar Pedidos</a>
            </div>
            <div class="metric-card">
                <h3>Productos en Stock</h3>
                <p>24</p>
                <a href="inventario.html" class="btn-admin">Ver Inventario</a>
            </div>
        </div>
    </main>

</body>
</html>
